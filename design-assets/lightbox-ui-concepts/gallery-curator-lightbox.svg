<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E8"/>
      <stop offset="0.46" stop-color="#ECE4D7"/>
      <stop offset="1" stop-color="#DDD2C2"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1380 230) rotate(137) scale(650 520)">
      <stop stop-color="#F5C474" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#F5C474" stop-opacity="0"/>
    </radialGradient>
    <filter id="museumShadow" x="-18%" y="-18%" width="136%" height="146%">
      <feDropShadow dx="0" dy="38" stdDeviation="34" flood-color="#6C5438" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.55"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix type="saturate" values="0.78"/>
    </filter>
    <clipPath id="artClip">
      <rect x="502" y="132" width="740" height="820" rx="6"/>
    </clipPath>
    <clipPath id="sideClip">
      <rect x="0" y="0" width="118" height="154" rx="4"/>
    </clipPath>
    <pattern id="grain" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="24" r="1" fill="#3F3226" opacity="0.05"/>
      <circle cx="96" cy="76" r="1.2" fill="#3F3226" opacity="0.035"/>
      <circle cx="136" cy="112" r="0.8" fill="#FFFFFF" opacity="0.22"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#paper)"/>
  <rect width="1920" height="1080" fill="url(#sun)"/>
  <rect width="1920" height="1080" fill="url(#grain)"/>
  <image href="../../public/gallery/1648138957448.png" x="1110" y="-20" width="610" height="900" preserveAspectRatio="xMidYMid slice" opacity="0.15" filter="url(#softBlur)"/>

  <g transform="translate(84 78)">
    <text x="0" y="0" fill="#2B241F" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="0.08em">PRIVATE GALLERY</text>
    <text x="0" y="38" fill="#6F6256" font-family="'Microsoft YaHei', sans-serif" font-size="15" letter-spacing="0.16em">策展式图片预览 / Museum detail view</text>
  </g>

  <g transform="translate(1370 134)">
    <line x1="0" y1="0" x2="0" y2="716" stroke="#2E2822" stroke-opacity="0.18"/>
    <text x="46" y="10" fill="#2B241F" font-family="Georgia, 'Times New Roman', serif" font-size="58">03</text>
    <text x="126" y="10" fill="#7C6F61" font-family="Georgia, 'Times New Roman', serif" font-size="28">/128</text>
    <text x="46" y="83" fill="#2B241F" font-family="'Microsoft YaHei', sans-serif" font-size="22">春日课堂</text>
    <text x="46" y="122" fill="#7A6B5C" font-family="'Microsoft YaHei', sans-serif" font-size="14" letter-spacing="0.08em">TAKAGI COLLECTION</text>
    <text x="46" y="186" fill="#4A4037" font-family="'Microsoft YaHei', sans-serif" font-size="15">让图片像“被装裱的作品”一样出现。</text>
    <text x="46" y="219" fill="#74685E" font-family="'Microsoft YaHei', sans-serif" font-size="14">右侧留白承载标题、序号、说明，</text>
    <text x="46" y="248" fill="#74685E" font-family="'Microsoft YaHei', sans-serif" font-size="14">比纯黑弹窗更有呼吸感。</text>
    <rect x="46" y="312" width="210" height="1" fill="#2E2822" fill-opacity="0.14"/>
    <text x="46" y="365" fill="#998873" font-family="'Microsoft YaHei', sans-serif" font-size="12" letter-spacing="0.16em">TAGS</text>
    <rect x="46" y="392" width="68" height="32" rx="16" fill="#2B241F" fill-opacity="0.07"/>
    <text x="68" y="413" fill="#55483B" font-family="'Microsoft YaHei', sans-serif" font-size="13">Anime</text>
    <rect x="126" y="392" width="76" height="32" rx="16" fill="#2B241F" fill-opacity="0.07"/>
    <text x="148" y="413" fill="#55483B" font-family="'Microsoft YaHei', sans-serif" font-size="13">Warm</text>
  </g>

  <g filter="url(#museumShadow)">
    <rect x="456" y="86" width="832" height="912" rx="18" fill="#FEFBF6"/>
    <rect x="482" y="112" width="780" height="860" rx="10" fill="#E9DDCE"/>
    <rect x="502" y="132" width="740" height="820" rx="6" fill="#111"/>
    <image href="../../public/gallery/1648138957448.png" x="502" y="132" width="740" height="820" preserveAspectRatio="xMidYMid slice" clip-path="url(#artClip)"/>
    <rect x="502" y="132" width="740" height="820" rx="6" stroke="#2B241F" stroke-opacity="0.14" stroke-width="1.2"/>
  </g>

  <g transform="translate(150 308)" opacity="0.95">
    <text x="0" y="-36" fill="#8D7B68" font-family="'Microsoft YaHei', sans-serif" font-size="12" letter-spacing="0.18em">UP NEXT</text>
    <g clip-path="url(#sideClip)"><image href="../../public/gallery/1648137770487.jpg" width="118" height="154" preserveAspectRatio="xMidYMid slice"/></g>
    <rect width="118" height="154" rx="4" stroke="#FFFFFF" stroke-opacity="0.6"/>
    <g transform="translate(0 190)" clip-path="url(#sideClip)"><image href="../../public/gallery/1648138372413.jpg" width="118" height="154" preserveAspectRatio="xMidYMid slice"/></g>
    <rect y="190" width="118" height="154" rx="4" stroke="#FFFFFF" stroke-opacity="0.6"/>
    <g transform="translate(0 380)" clip-path="url(#sideClip)"><image href="../../public/gallery/1648138507557.png" width="118" height="154" preserveAspectRatio="xMidYMid slice"/></g>
    <rect y="380" width="118" height="154" rx="4" stroke="#FFFFFF" stroke-opacity="0.6"/>
  </g>

  <g>
    <circle cx="76" cy="540" r="34" fill="#2B241F" fill-opacity="0.08"/>
    <path d="M84 520L64 540L84 560" stroke="#2B241F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1844" cy="540" r="34" fill="#2B241F" fill-opacity="0.08"/>
    <path d="M1836 520L1856 540L1836 560" stroke="#2B241F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1854" cy="58" r="28" fill="#2B241F" fill-opacity="0.08"/>
    <path d="M1844 48L1864 68M1864 48L1844 68" stroke="#2B241F" stroke-opacity="0.68" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
