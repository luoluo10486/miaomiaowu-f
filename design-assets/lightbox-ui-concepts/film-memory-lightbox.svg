<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="night" x1="243" y1="16" x2="1561" y2="1112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182231"/>
      <stop offset="0.48" stop-color="#0E111B"/>
      <stop offset="1" stop-color="#05060B"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(536 250) rotate(58) scale(560 766)">
      <stop stop-color="#7CE3FF" stop-opacity="0.23"/>
      <stop offset="1" stop-color="#7CE3FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="roseGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1356 814) rotate(146) scale(616 588)">
      <stop stop-color="#FFAB8A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFAB8A" stop-opacity="0"/>
    </radialGradient>
    <filter id="dreamBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
      <feColorMatrix type="saturate" values="1.2"/>
    </filter>
    <filter id="photoShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="36" flood-color="#000000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="25" flood-color="#6DEBFF" flood-opacity="0.12"/>
    </filter>
    <clipPath id="photoClip">
      <rect x="634" y="119" width="650" height="820" rx="18"/>
    </clipPath>
    <clipPath id="stripClip">
      <rect x="0" y="0" width="96" height="128" rx="10"/>
    </clipPath>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#FFFFFF" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#night)"/>
